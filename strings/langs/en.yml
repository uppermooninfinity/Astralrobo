setting_1 : "<u><b>{0} sᴇᴛᴛɪɴɢs ᴘᴀɴᴇʟ</b></u>\n\n<b>ᴄʜᴀᴛ ɪᴅ :</b> <code>{1}</code>\n<b>ᴄʜᴀᴛ ᴛɪᴛʟᴇ :</b> {2}\n\n⚙ sᴇʟᴇᴄᴛ ᴀɴ ᴏᴘᴛɪᴏɴ ʙᴇʟᴏᴡ ᴛᴏ ᴄᴏɴꜰɪɢᴜʀᴇ ɢʀᴏᴜᴘ sᴇᴛᴛɪɴɢs."
setting_2 : "» ᴅɪʀᴇᴄᴛ : ᴘʟᴀʏs sᴇᴀʀᴄʜ ʀᴇsᴜʟᴛs ɪɴsᴛᴀɴᴛʟʏ.\n\n» ɪɴʟɪɴᴇ : sʜᴏᴡs ɪɴʟɪɴᴇ ʙᴜᴛᴛᴏɴs ᴛᴏ sᴇʟᴇᴄᴛ ʙᴇᴛᴡᴇᴇɴ ᴀᴜᴅɪᴏ ᴏʀ ᴠɪᴅᴇᴏ."
setting_3 : "» ᴇᴠᴇʀʏᴏɴᴇ : ᴀɴʏ ᴍᴇᴍʙᴇʀ ᴄᴀɴ ᴜsᴇ ᴀᴅᴍɪɴ ᴄᴏᴍᴍᴀɴᴅs (sᴋɪᴘ, ᴘᴀᴜsᴇ, ʀᴇsᴜᴍᴇ, ᴇᴛᴄ.).\n\n» ᴀᴅᴍɪɴ ᴏɴʟʏ : ᴏɴʟʏ ᴀᴅᴍɪɴs ᴀɴᴅ ᴀᴜᴛʜᴏʀɪᴢᴇᴅ ᴜsᴇʀs ᴄᴀɴ ᴜsᴇ ᴀᴅᴍɪɴ ᴄᴏᴍᴍᴀɴᴅs."
setting_4 : "⚠ ɴᴏ ᴀᴜᴛʜᴏʀɪᴢᴇᴅ ᴜsᴇʀs ꜰᴏᴜɴᴅ."
setting_5 : "» ɢʀᴏᴜᴘ : ᴘʟᴀʏs ᴍᴜsɪᴄ ɪɴ ᴛʜᴇ sᴀᴍᴇ ɢʀᴏᴜᴘ ᴡʜᴇʀᴇ ᴛʜᴇ ᴄᴏᴍᴍᴀɴᴅ ɪs ᴜsᴇᴅ.\n\n» ᴄʜᴀɴɴᴇʟ : ᴘʟᴀʏs ᴍᴜsɪᴄ ɪɴ ᴀ sᴘᴇᴄɪꜰɪᴄ ᴄʜᴀɴɴᴇʟ. sᴇᴛ ᴛʜᴇ ᴄʜᴀɴɴᴇʟ ɪᴅ ᴜsɪɴɢ /channelplay."
